<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible"
    content="IE=edge">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <title>Prince Singh Chauhan | DOM</title>
</head>

<body style="background-color: #212121; color: #fff;">
    <ul class="language">
        <li>JavaScript</li>
        <li>Python</li>
        <li>Java</li>
    </ul>
</body>
<script>
    function addLanguage(language) {
       const li = document.createElement("li"); 
        li.innerText = `${language}`;
        document.querySelector(".language").appendChild(li);
    }
    addLanguage("C++");
    addLanguage("Go");
    addLanguage("Rust");

    function addOptiLanguage(language) {
        const li = document.createElement("li"); 
         li.appendChild(document.createTextNode(`${language}`));
         document.querySelector(".language").appendChild(li);
    
    }
    addOptiLanguage("C#");
    addOptiLanguage("PHP"); 


    // Editing 

    const secondLanguage = document.querySelector("li:nth-child(2)");
    secondLanguage.innerText = "mojo";

    const newli = document.createElement("li");
    newli.textContent = "Dart";

    secondLanguage.replaceWith(newli);

    // edit

    const secondLang = document.querySelector("li:first-child");
    secondLang.outerHTML = `<li style="color: orange;">${secondLang.innerText}</li>`;

// remove
const lastLang = document.querySelector("li:last-child");
lastLang.remove();

</script>

</html>
